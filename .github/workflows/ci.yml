name: CI

on:
  pull_request:
    branches: [ main, develop, 'feature/**' ]
  push:
    branches: [ main, develop, 'feature/**' ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      core: ${{ steps.filter.outputs.core }}
      ml: ${{ steps.filter.outputs.ml }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ml_base: ${{ steps.filter.outputs.ml_base }}

    steps:
      - uses: actions/checkout@v4

      # Detect changes
      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'apps/core-api/**'

            ml:
              - 'apps/ml-service/**'
              - '!apps/ml-service/requirements.txt'

            ml_base:
              - 'apps/ml-service/requirements.txt'

            frontend:
              - 'apps/frontend/**'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          pip install -r apps/core-api/requirements.txt

#      - name: Import check
#        run: |
#          PYTHONPATH=apps/core-api python -c "import src.main"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/\//-/g')

          if [ "$BRANCH" = "main" ]; then
            TAG=latest
          elif [ "$BRANCH" = "develop" ]; then
            TAG=develop
          else
            TAG="$SAFE_BRANCH"
          fi

          SHA_TAG="${TAG}-${{ github.sha }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_ENV

      - name: Login GHCR
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ML BASE
      - name: Build ML base
        if: needs.test.outputs.ml_base == 'true'
        run: |
          docker build -f apps/ml-service/Dockerfile.base \
            -t ghcr.io/${{ github.repository }}/recsys-ml-base:${{ env.TAG }} \
            ./apps/ml-service

      - name: Push ML base
        if: needs.test.outputs.ml_base == 'true' && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
        run: docker push ghcr.io/${{ github.repository }}/recsys-ml-base:${{ env.TAG }}

      # ML SERVICE
      - name: Build ML service
        if: needs.test.outputs.ml == 'true' || needs.test.outputs.ml_base == 'true'
        run: |
          docker build -t ghcr.io/${{ github.repository }}/recsys-ml-service:${{ env.TAG }} \
            -t ghcr.io/${{ github.repository }}/recsys-ml-service:${{ env.SHA_TAG }} \
            ./apps/ml-service

      - name: Push ML service
        if: (needs.test.outputs.ml == 'true' || needs.test.outputs.ml_base == 'true') && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
        run: |
          docker push ghcr.io/${{ github.repository }}/recsys-ml-service:${{ env.TAG }}
          docker push ghcr.io/${{ github.repository }}/recsys-ml-service:${{ env.SHA_TAG }}

      # CORE API
      - name: Build core-api
        if: needs.test.outputs.core == 'true'
        run: |
          docker build -t ghcr.io/${{ github.repository }}/recsys-core-api:${{ env.TAG }} \
            -t ghcr.io/${{ github.repository }}/recsys-core-api:${{ env.SHA_TAG }} \
            ./apps/core-api

      - name: Push core-api
        if: needs.test.outputs.core == 'true' && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
        run: |
          docker push ghcr.io/${{ github.repository }}/recsys-core-api:${{ env.TAG }}
          docker push ghcr.io/${{ github.repository }}/recsys-core-api:${{ env.SHA_TAG }}

      # FRONTEND
      - name: Build frontend
        if: needs.test.outputs.frontend == 'true'
        run: |
          docker build -t ghcr.io/${{ github.repository }}/recsys-frontend:${{ env.TAG }} \
            -t ghcr.io/${{ github.repository }}/recsys-frontend:${{ env.SHA_TAG }} \
            ./apps/frontend

      - name: Push frontend
        if: needs.test.outputs.frontend == 'true' && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
        run: |
          docker push ghcr.io/${{ github.repository }}/recsys-frontend:${{ env.TAG }}
          docker push ghcr.io/${{ github.repository }}/recsys-frontend:${{ env.SHA_TAG }}