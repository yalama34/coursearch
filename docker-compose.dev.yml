services:

  ml_service:
    build:
      context: ./apps/ml-service
      dockerfile: ./Dockerfile

    container_name: recsys_ml_service
    restart: always

    environment:
      # postgres
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      # chroma
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      # models
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      #LLM
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      # redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - ./data:/data
      - ./apps/ml-service/models:/models

    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null --max-time 5 http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

    ports:
      - "${ML_PORT}:8001"

    networks:
      - recsys_net

  migration:
    image: recsys_backend_image:latest
    build:
      context: ./apps/core-api
      dockerfile: ./Dockerfile

    container_name: recsys_migrations

    command: ./migrate.sh
    restart: "no"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - recsys_net

  core_api:
    image: recsys_backend_image:latest

    container_name: recsys_backend
    restart: always

    environment:
      # postgres
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      # chroma
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      # ml-service
      ML_SERVICE_URL: http://ml_service:8001

    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ml_service:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

    ports:
      - "${API_PORT}:8000"

    networks:
      - recsys_net


  frontend:
     build:
       dockerfile: ./Dockerfile
       context: ./apps/frontend

     container_name: frontend
     restart: always

     environment:
       - REACT_APP_API_URL=http://core_api:8000
     depends_on:
       - core_api

     ports:
       - "${FRONTEND_PORT}:3000"

     networks:
       - recsys_net