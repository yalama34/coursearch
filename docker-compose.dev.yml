services:

  ml_service:
    build:
      context: ./apps/ml-service
      dockerfile: ./Dockerfile

    container_name: recsys_ml_service
    restart: unless-stopped

    environment:
      # postgres
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      # chroma
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      # models
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      #LLM
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      # redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - ./apps/ml-service:/app
      - ./data:/data
      - ./apps/ml-service/models:/models

    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null --max-time 5 http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

    ports:
      - "${ML_PORT}:8001"

    networks:
      - recsys_net

  migration:
    build:
      context: ./apps/core-api
      dockerfile: ./Dockerfile

    container_name: recsys_migrations

    command: ./migrate.sh
    restart: "no"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - recsys_net

  core_api:
    build:
      context: ./apps/core-api
      dockerfile: ./Dockerfile

    container_name: recsys_backend
    restart: unless-stopped

    environment:
      # postgres
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      # chroma
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      #redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # ml-service
      ML_SERVICE_URL: http://ml_service:8001

    volumes:
      - ./apps/core-api:/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml_service:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

    ports:
      - "${API_PORT}:8000"

    networks:
      - recsys_net


  frontend:
     build:
       dockerfile: ./Dockerfile
       context: ./apps/frontend

     container_name: recsys_frontend
     restart: unless-stopped

     environment:
        REACT_APP_API_URL: http://core_api:8000
     depends_on:
       - core_api

     ports:
       - "${FRONTEND_PORT}:3000"

     networks:
       - recsys_net

  course_provider:
    build:
      context: ./apps/course-provider
      dockerfile: ./Dockerfile

    container_name: recsys_course_provider
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

      STEPIK_CLIENT_ID: ${STEPIK_CLIENT_ID}
      STEPIK_CLIENT_SECRET: ${STEPIK_CLIENT_SECRET}
      UDEMY_CLIENT_ID: ${UDEMY_CLIENT_ID}
      UDEMY_CLIENT_SECRET: ${UDEMY_CLIENT_SECRET}
      ENABLED_PROVIDERS: ${ENABLED_PROVIDERS}

    volumes:
      - ./apps/course-provider:/app

    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null --max-time 5 http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - recsys_net

volumes:
  postgres_data:
  chroma_data:

networks:
  recsys_net:
    driver: bridge
